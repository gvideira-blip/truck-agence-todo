<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tâches du jour — Truck Agence</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f7f5;
      --border: rgba(0,0,0,0.12);
      --text: #1a1a1a;
      --text2: #666;
      --text3: #aaa;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg2);
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
    }

    .wrap {
      background: var(--bg);
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      overflow: hidden;
      max-width: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
    }

    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #CD1719; flex-shrink: 0; }
    .logo { height: 28px; }
    .topbar-title { font-size: 16px; font-weight: 500; color: var(--text); }
    .topbar-date { font-size: 13px; color: var(--text3); }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .sync-status {
      font-size: 12px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; flex-shrink: 0;
      transition: background 0.3s;
    }
    .sync-dot.ok { background: #639922; }
    .sync-dot.saving { background: #EF9F27; }
    .sync-dot.error { background: #E24B4A; }

    .reset-btn {
      font-size: 13px; color: var(--text2);
      background: none; border: 0.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 6px 14px;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
    }
    .reset-btn:hover { background: var(--bg2); }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    thead th {
      padding: 12px 14px;
      font-size: 13px; font-weight: 500; color: var(--text2);
      border-left: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2); text-align: left;
    }
    thead th:first-child { border-left: none; width: 40px; text-align: center; }

    .th-inner { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500; flex-shrink: 0;
    }
    .av-c  { background: #E6F1FB; color: #0C447C; }
    .av-ca { background: #E1F5EE; color: #085041; }
    .av-l  { background: #EEEDFE; color: #3C3489; }

    tbody td {
      border-left: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      vertical-align: middle; padding: 0;
    }
    tbody td:first-child {
      border-left: none; text-align: center;
      font-size: 13px; color: var(--text3); width: 40px;
    }
    tbody tr:last-child td { border-bottom: none; }

    .cell-inner { display: flex; align-items: stretch; min-height: 72px; }

    .task-area {
      display: flex; align-items: flex-start;
      gap: 10px; padding: 10px 10px 10px 14px;
      flex: 1; transition: background 0.1s; cursor: text;
    }
    .task-area:hover { background: var(--bg2); }

    .task-area input[type=checkbox] {
      width: 20px; height: 20px; cursor: pointer;
      accent-color: #004472; flex-shrink: 0; margin-top: 14px;
    }

    .task-area textarea {
      flex: 1; font-size: 15px;
      font-family: inherit; color: var(--text);
      background: none; border: none; outline: none;
      resize: none; line-height: 1.6;
      padding: 10px 0; min-height: 50px; overflow: hidden;
    }
    .task-area textarea::placeholder { color: var(--text3); }
    .task-area textarea.done {
      text-decoration: line-through; color: var(--text3);
    }

    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text3); padding: 2px; border-radius: 4px;
      opacity: 0; transition: opacity 0.15s;
      font-size: 15px; margin-top: 12px; flex-shrink: 0;
    }
    .task-area:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #CD1719; }

    .prio-area {
      width: 64px; border-left: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .prio-input {
      width: 100%; height: 100%; border: none; outline: none;
      background: none; font-size: 22px; font-weight: 500;
      text-align: center; font-family: inherit;
      color: var(--text); cursor: text; padding: 10px 4px;
      min-height: 72px;
    }
    .prio-input::placeholder { color: var(--text3); font-size: 15px; font-weight: 400; }

    tfoot td {
      border-left: 0.5px solid var(--border);
      border-top: 0.5px solid var(--border);
      background: var(--bg2);
    }
    tfoot td:first-child { border-left: none; text-align: center; }
    .add-inner {
      display: flex; align-items: center;
      gap: 8px; padding: 10px 12px;
    }
    .add-inner input {
      flex: 1; font-size: 14px; background: none;
      border: none; outline: none; font-family: inherit;
      color: var(--text); padding: 4px 0;
    }
    .add-inner input::placeholder { color: var(--text3); }

    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text2);
      z-index: 100;
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loader">Chargement…</div>

<div class="wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="dot"></div>
      <span class="topbar-title">Tâches du jour</span>
      <span class="topbar-date" id="tdate"></span>
    </div>
    <div class="topbar-right">
      <div class="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">—</span>
      </div>
      <button class="reset-btn" onclick="resetAll()">
        <i class="ti ti-refresh"></i> Reset
      </button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th><div class="th-inner"><div class="avatar av-c">Ch</div>Chloé</div></th>
        <th><div class="th-inner"><div class="avatar av-ca">Ca</div>Camille</div></th>
        <th><div class="th-inner"><div class="avatar av-l">Li</div>Lila</div></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td><i class="ti ti-plus" style="font-size:14px;color:var(--text3);"></i></td>
        <td><div class="add-inner"><input id="add-0" placeholder="Ajouter une tâche…" onkeydown="handleAdd(event,0)"/></div></td>
        <td><div class="add-inner"><input id="add-1" placeholder="Ajouter une tâche…" onkeydown="handleAdd(event,1)"/></div></td>
        <td><div class="add-inner"><input id="add-2" placeholder="Ajouter une tâche…" onkeydown="handleAdd(event,2)"/></div></td>
      </tr>
    </tfoot>
  </table>
</div>

<script>
const COLS = 3;
let data = [];
let saveTimer = null;

function defaultData() {
  return Array.from({ length: 10 }, () =>
    Array.from({ length: COLS }, () => ({ text: '', done: false, prio: '' }))
  );
}

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  label.textContent = state === 'ok' ? 'Synchronisé' : state === 'saving' ? 'Enregistrement…' : 'Erreur sync';
}

async function loadFromServer() {
  try {
    const r = await fetch('/api/tasks');
    if (!r.ok) throw new Error();
    data = await r.json();
    setSyncStatus('ok');
  } catch (e) {
    data = defaultData();
    setSyncStatus('error');
  }
  document.getElementById('loader').style.display = 'none';
  render();
  setInterval(pollServer, 5000);
}

async function pollServer() {
  try {
    const r = await fetch('/api/tasks');
    if (!r.ok) return;
    const fresh = await r.json();
    data = fresh;
    render();
    setSyncStatus('ok');
  } catch (e) {
    setSyncStatus('error');
  }
}

function scheduleSave() {
  setSyncStatus('saving');
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToServer, 800);
}

async function saveToServer() {
  try {
    const r = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error();
    setSyncStatus('ok');
  } catch (e) {
    setSyncStatus('error');
  }
}

function prioClass(v) { return ''; }

function setPrio(ri, ci, val) {
  data[ri][ci].prio = val.slice(0, 3);
  scheduleSave();
}

function render() {
  const tb = document.getElementById('tbody');
  const scrollTops = {};
  tb.querySelectorAll('textarea').forEach((ta, i) => { scrollTops[i] = ta.scrollTop; });
  tb.innerHTML = '';
  data.forEach((row, ri) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${ri + 1}</td>` + row.map((cell, ci) => `
      <td>
        <div class="cell-inner">
          <div class="task-area">
            <input type="checkbox" ${cell.done ? 'checked' : ''} aria-label="Fait" onchange="toggle(${ri},${ci})"/>
            <textarea rows="1" placeholder="—" class="${cell.done ? 'done' : ''}"
              onblur="edit(${ri},${ci},this.value)"
              oninput="resize(this)"
            >${cell.text}</textarea>
            <button class="del-btn" onclick="clearCell(${ri},${ci})" aria-label="Effacer">
              <i class="ti ti-x"></i>
            </button>
          </div>
          <div class="prio-area">
            <input class="prio-input" type="text" maxlength="3"
              value="${cell.prio}" placeholder="P"
              aria-label="Priorité"
              oninput="setPrio(${ri},${ci},this.value)"
            />
          </div>
        </div>
      </td>`).join('');
    tb.appendChild(tr);
    row.forEach((_, ci) => {
      const ta = tr.querySelectorAll('textarea')[ci];
      if (ta) setTimeout(() => resize(ta), 0);
    });
  });
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(50, el.scrollHeight) + 'px';
}

function toggle(ri, ci) {
  data[ri][ci].done = !data[ri][ci].done;
  scheduleSave(); render();
}

function edit(ri, ci, val) {
  data[ri][ci].text = val;
  scheduleSave();
}

function clearCell(ri, ci) {
  data[ri][ci] = { text: '', done: false, prio: '' };
  scheduleSave(); render();
}

function handleAdd(e, ci) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = e.target.value.trim();
  if (!val) return;
  const emptyRow = data.findIndex(row => !row[ci].text);
  if (emptyRow >= 0) {
    data[emptyRow][ci].text = val;
  } else {
    const nr = Array.from({ length: COLS }, () => ({ text: '', done: false, prio: '' }));
    nr[ci].text = val;
    data.push(nr);
  }
  e.target.value = '';
  scheduleSave(); render();
}

function resetAll() {
  if (!confirm('Remettre à zéro toutes les cases ?')) return;
  data = data.map(row => row.map(c => ({ ...c, done: false, prio: '' })));
  scheduleSave(); render();
}

document.getElementById('tdate').textContent =
  '— ' + new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

loadFromServer();
</script>
</body>
</html>
