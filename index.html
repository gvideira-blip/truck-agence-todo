<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tâches du jour — Truck Agence</title>
  <script>
    (function() {
      const until = parseInt(localStorage.getItem('ta_auth_until') || '0');
      if (until <= Date.now()) {
        window.location.href = '/login.html?next=' + encodeURIComponent(window.location.pathname);
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --text2: #777;
      --text3: #bbb;
      --blue: #004472;
      --red: #CD1719;
      --r: 12px;
      --rs: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg2);
      min-height: 100vh;
      padding: 24px;
      color: var(--text);
    }

    /* NAV */
    .nav {
      display: flex; justify-content: center; gap: 8px; margin-bottom: 16px;
    }
    .nav a {
      font-size: 12px; color: var(--text2); text-decoration: none;
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px;
      background: var(--bg); transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .nav a:hover { border-color: var(--blue); color: var(--blue); }
    .nav a.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .wrap {
      background: var(--bg); border-radius: var(--r);
      border: 1px solid var(--border);
    }
    /* Pas de overflow:hidden ici — le table-scroll en a besoin */

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
    .title { font-size: 15px; font-weight: 500; }
    .date { font-size: 13px; color: var(--text3); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .sync { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
    .sync-dot.ok     { background: #5a9a2a; }
    .sync-dot.saving { background: #e0920a; }
    .sync-dot.error  { background: #d03030; }
    .btn-reset {
      font-size: 12px; color: var(--text2);
      background: none; border: 1px solid var(--border);
      border-radius: var(--rs); padding: 5px 12px;
      cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .btn-reset:hover { background: var(--bg2); }

    table { width: 100%; border-collapse: collapse; table-layout: auto; }

    thead th {
      padding: 9px 14px; font-size: 13px; font-weight: 500; color: var(--text2);
      border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
      background: var(--bg2); text-align: left;
    }
    thead th:first-child {
      border-left: none; width: 36px; text-align: center;
      color: var(--text3); font-weight: 400;
    }

    .th-inner { display: flex; align-items: center; gap: 7px; }
    .avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 500;
    }
    /* Les couleurs des avatars sont appliquées dynamiquement
       depuis la configuration (page ⚙️ Configuration). */

    tbody td {
      border-left: 1px solid var(--border); border-bottom: 1px solid var(--border);
      padding: 0; vertical-align: middle;
    }
    tbody td:first-child {
      border-left: none; text-align: center;
      font-size: 12px; color: var(--text3); width: 36px;
    }
    tbody tr:last-child td { border-bottom: none; }

    .cell { display: flex; align-items: center; min-height: 48px; }

    .task {
      flex: 1; display: flex; align-items: center;
      gap: 8px; padding: 4px 8px 4px 12px; transition: background 0.1s;
    }
    .task:hover { background: var(--bg2); }

    .task input[type=checkbox] {
      width: 20px; height: 20px; accent-color: var(--blue);
      flex-shrink: 0; cursor: pointer;
    }

    .task textarea {
      flex: 1; font-size: 14px; font-family: inherit;
      color: var(--text); background: none;
      border: none; outline: none; resize: none;
      line-height: 1.5; padding: 6px 0;
      min-height: 28px; overflow: hidden;
    }
    .task textarea::placeholder { color: var(--text3); }
    .task textarea.done { text-decoration: line-through; color: var(--text3); }

    .del {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 13px;
      padding: 2px; border-radius: 4px;
      opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
    }
    .task:hover .del { opacity: 1; }
    .del:hover { color: var(--red); }

    .prio {
      width: 52px; flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      padding: 4px; align-self: stretch;
    }
    .prio-btn {
      width: 100%; height: 40px; background: white;
      border: 1.5px dashed var(--border); border-radius: 6px;
      font-size: 18px; font-weight: 500; color: var(--blue);
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.1s;
    }
    .prio-btn.filled { border-style: solid; border-color: var(--blue); background: #f0f6fa; }
    .prio-btn:hover { border-color: var(--blue); }
    .prio-btn .placeholder { color: var(--text3); font-size: 13px; font-weight: 400; }

    /* ── Modal priorité ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 24px; min-width: 280px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal-title { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 12px; }
    .modal-input {
      width: 100%; height: 64px; background: var(--bg2);
      border: 2px solid var(--blue); border-radius: 10px; margin-bottom: 16px;
      text-align: center; outline: none;
      font-size: 28px; font-weight: 500; color: var(--blue); font-family: inherit;
    }
    .modal-input::placeholder { color: var(--text3); font-size: 16px; font-weight: 400; }
    .keypad {
      display: grid; grid-template-columns: repeat(3, 64px);
      gap: 8px; justify-content: center;
    }
    .key {
      height: 52px; font-size: 20px; font-weight: 500; background: white;
      border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-family: inherit; color: var(--text);
      transition: background 0.1s, transform 0.05s;
    }
    .key:hover { background: var(--bg2); }
    .key:active { transform: scale(0.95); background: #e0e0de; }
    .key.action { font-size: 13px; color: var(--text2); }
    .key.ok { background: var(--blue); color: white; border-color: var(--blue); font-weight: 500; }
    .key.ok:hover { background: #003560; }
    .key.del-key { color: var(--red); }
    .modal-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; }

    /* ── Info de renumbering ── */
    .modal-renumber-info {
      font-size: 11px; color: var(--blue); text-align: center;
      margin-top: 6px; padding: 4px 8px; background: #f0f6fa;
      border-radius: 6px; display: none;
    }
    .modal-renumber-info.show { display: block; }

    tfoot td {
      border-left: 1px solid var(--border); border-top: 1px solid var(--border);
      background: var(--bg2); padding: 0;
    }
    tfoot td:first-child { border-left: none; text-align: center; color: var(--text3); }
    .add-cell { display: flex; align-items: center; gap: 6px; padding: 8px 12px; }
    .add-cell input {
      flex: 1; font-size: 14px; background: none;
      border: none; outline: none; font-family: inherit;
      color: var(--text); padding: 3px 0;
    }
    .add-cell input::placeholder { color: var(--text3); }

    #loader {
      position: fixed; inset: 0; background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text2); z-index: 100;
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE MOBILE — Option B : scroll horizontal
       Actif sur TOUTES tailles pour garantir le scroll.
       ═══════════════════════════════════════════ */

    /* Le scroll wrapper est toujours actif */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      /* Ombres de bord : signal visuel de scroll */
      background:
        linear-gradient(to right, white 20%, rgba(255,255,255,0)),
        linear-gradient(to right, rgba(255,255,255,0), white 80%) 100% 0,
        radial-gradient(farthest-side at 0% 50%, rgba(0,0,0,0.07), transparent),
        radial-gradient(farthest-side at 100% 50%, rgba(0,0,0,0.07), transparent) 100% 0;
      background-repeat: no-repeat;
      background-size: 40px 100%, 40px 100%, 12px 100%, 12px 100%;
      background-attachment: local, local, scroll, scroll;
    }

    /* Largeur minimale du tableau : force le scroll si l'écran est trop petit */
    table { min-width: 560px; }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .nav { gap: 5px; margin-bottom: 12px; }
      .nav a { font-size: 11px; padding: 5px 10px; gap: 3px; }
      .topbar { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
      .topbar-left { flex: 1; }
      .topbar-right { width: 100%; justify-content: flex-end; }
      .date { display: none; }
      table { font-size: 12px; }
      thead th { padding: 7px 8px; font-size: 10px; }
      thead th:first-child { width: 28px; }
      .cell { min-height: 44px; }
      .task { padding: 4px 6px 4px 8px; gap: 6px; }
      .task textarea { font-size: 13px; }
      .task input[type=checkbox] { width: 18px; height: 18px; }
      .prio { width: 46px; }
      .prio-btn { height: 36px; font-size: 16px; }
      .add-cell { padding: 6px 8px; }
      .add-cell input { font-size: 13px; }
      /* Modal : monte depuis le bas sur mobile */
      .modal-bg { align-items: flex-end; }
      .modal { border-radius: 16px 16px 0 0; width: 100%; padding: 20px 16px 36px; }
      .keypad { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .key { height: 56px; }
    }
    @media (max-width: 480px) {
      .nav a span { display: none; }
      .nav a { padding: 6px 10px; }
    }
  </style>
</head>

<div id="loader">Chargement…</div>

<nav class="nav">

<div class="wrap">
  <div class="topbar">
    <div class="topbar-left">

<!-- Modal priorité -->
<div class="modal-bg" id="modal-bg" onclick="closeKeypadIfBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Priorité</div>
    <input class="modal-input" id="modal-input" type="text" inputmode="numeric"
      placeholder="—" maxlength="4"
      oninput="kpType(this.value)"
      onkeydown="kpKeydown(event)" />
    <div class="modal-renumber-info" id="renumberInfo"></div>
    <div class="keypad">
      <button class="key" onclick="kpAdd('1')">1</button>
      <button class="key" onclick="kpAdd('2')">2</button>
      <button class="key" onclick="kpAdd('3')">3</button>
      <button class="key" onclick="kpAdd('4')">4</button>
      <button class="key" onclick="kpAdd('5')">5</button>
      <button class="key" onclick="kpAdd('6')">6</button>
      <button class="key" onclick="kpAdd('7')">7</button>
      <button class="key" onclick="kpAdd('8')">8</button>
      <button class="key" onclick="kpAdd('9')">9</button>
      <button class="key action del-key" onclick="kpDel()">←</button>
      <button class="key" onclick="kpAdd('0')">0</button>
      <button class="key action ok" onclick="kpOk()">OK</button>
    </div>
    <div class="modal-hint">Tapez au clavier ou utilisez le pavé — Entrée pour valider</div>
  </div>
</div>

<script>
// ─── Équipe ──────────────────────────────────────────────────
// La liste des commerciaux vient de /api/config et se gère depuis
// la page ⚙️ Configuration. L'ordre de la liste = l'ordre des colonnes.
const PALETTE = [
  { bg: '#deeefb', fg: '#0a4a7c' }, // 0 bleu
  { bg: '#d6f0e6', fg: '#08503e' }, // 1 vert
  { bg: '#eae8fc', fg: '#3a338a' }, // 2 violet
  { bg: '#fde8ef', fg: '#8a2a55' }, // 3 rose
  { bg: '#d8f1f4', fg: '#0b5d68' }, // 4 turquoise
  { bg: '#fde4d2', fg: '#8a4210' }, // 5 orange
  { bg: '#e6f2cf', fg: '#4a6314' }, // 6 vert clair
  { bg: '#e9e9e9', fg: '#555555' }  // 7 gris
];
function pal(i) { return PALETTE[(i >= 0 && i < 8) ? i : 7]; }
function initiales(nom) {
  const s = (nom || '').trim();
  if (!s) return '?';
  return s.charAt(0).toUpperCase() + (s.charAt(1) || '').toLowerCase();
}
function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let COMMS = [];             // [{ id, nom, couleur }]
let data  = { cols: {} };   // { cols: { <idCommercial>: [ {text,done,prio}, ... ] } }
let saveTimer = null;
let kpTarget = null;        // { ri, ci }

// ─── Verrou anti-écrasement ──────────────────────────────────
// pendingSave passe à true dès qu'une modif locale est faite et
// ne repasse à false QUE lorsque le serveur a confirmé la
// sauvegarde. Tant qu'il est true, le poll NE DOIT PAS écraser
// les données locales (sinon les modifs en rafale "reviennent").
let pendingSave = false;

// ─── Accès aux cellules ──────────────────────────────────────
function colArr(ci) {
  const id = COMMS[ci].id;
  if (!Array.isArray(data.cols[id])) data.cols[id] = [];
  return data.cols[id];
}
function cellAt(ri, ci) {
  const arr = colArr(ci);
  while (arr.length <= ri) arr.push({ text: '', done: false, prio: '' });
  return arr[ri];
}
function rowCount() {
  let m = 10;
  for (let ci = 0; ci < COMMS.length; ci++) m = Math.max(m, colArr(ci).length);
  return m;
}

function setSyncStatus(s) {
  document.getElementById('sdot').className = 'sync-dot ' + s;
  document.getElementById('slabel').textContent =
    s === 'ok' ? 'Synchronisé' : s === 'saving' ? 'Enregistrement…' : 'Erreur sync';
}

// ─── Chargement & poll ───────────────────────────────────────
async function fetchConfig() {
  const r = await fetch('/api/config');
  if (!r.ok) throw 0;
  const j = await r.json();
  if (!Array.isArray(j.commerciaux) || j.commerciaux.length === 0) throw 0;
  return j.commerciaux;
}

async function load() {
  try {
    const [comms, r] = await Promise.all([fetchConfig(), fetch('/api/tasks')]);
    if (!r.ok) throw 0;
    const j = await r.json();
    COMMS = comms;
    data = (j && typeof j === 'object' && j.cols) ? j : { cols: {} };
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
  document.getElementById('loader').style.display = 'none';
  renderHeader();
  render();
  setInterval(poll, 5000);
}

async function poll() {
  if (kpTarget) return;
  // ── Verrou : ne JAMAIS écraser des modifs locales non confirmées ──
  if (pendingSave) return;
  if (document.activeElement && (
    document.activeElement.tagName === 'TEXTAREA' ||
    document.activeElement.tagName === 'INPUT'
  )) return;
  try {
    const [comms, r] = await Promise.all([fetchConfig(), fetch('/api/tasks')]);
    if (!r.ok) return;
    const newData = await r.json();
    // Re-vérification du verrou APRÈS le fetch
    if (pendingSave) return;
    let dirty = false;
    if (JSON.stringify(comms) !== JSON.stringify(COMMS)) {
      COMMS = comms;          // l'équipe a changé (page Configuration)
      renderHeader();
      dirty = true;
    }
    if (JSON.stringify(newData) !== JSON.stringify(data)) {
      data = (newData && newData.cols) ? newData : { cols: {} };
      dirty = true;
    }
    if (dirty) render();
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

// ─── Save ────────────────────────────────────────────────────
function save() {
  setSyncStatus('saving');
  pendingSave = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const snapshot = JSON.stringify(data); // data = { cols: {...} }
    try {
      const r = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: snapshot
      });
      if (!r.ok) throw 0;
      if (JSON.stringify(data) === snapshot) {
        pendingSave = false;
      }
      setSyncStatus('ok');
      rtNotify('tasks'); // prévient instantanément les autres appareils
    } catch(e) {
      setSyncStatus('error');
    }
  }, 700);
}

// ─── Renumbering des priorités (par colonne, inchangé) ───────
function renumberPriorities(ci) {
  const arr = colArr(ci);
  const cells = [];
  for (let ri = 0; ri < arr.length; ri++) {
    const cell = arr[ri];
    if (cell.prio !== '' && cell.text !== '') {
      cells.push({ ri, prio: parseFloat(cell.prio) });
    }
  }
  if (cells.length === 0) return;
  cells.sort((a, b) => a.prio - b.prio);
  cells.forEach((c, idx) => { arr[c.ri].prio = String(idx + 1); });
}

// ─── Tri & rendu ─────────────────────────────────────────────
function buildSortedIndexes() {
  const maxRows = rowCount();
  const result  = Array.from({ length: maxRows }, () => new Array(COMMS.length));
  for (let ci = 0; ci < COMMS.length; ci++) {
    const entries = [];
    for (let ri = 0; ri < maxRows; ri++) {
      entries.push({ ri, cell: cellAt(ri, ci) });
    }
    const withPrio = entries.filter(e => e.cell.prio !== '' && e.cell.text !== '');
    const noPrio   = entries.filter(e => e.cell.prio === '' && e.cell.text !== '');
    const empty    = entries.filter(e => e.cell.text === '');
    withPrio.sort((a, b) => parseFloat(a.cell.prio) - parseFloat(b.cell.prio));
    const ordered = [...withPrio, ...noPrio, ...empty];
    for (let di = 0; di < ordered.length && di < maxRows; di++) {
      result[di][ci] = ordered[di].ri;
    }
  }
  return result;
}

function renderHeader() {
  let h = '<th>#</th>';
  for (const c of COMMS) {
    const p = pal(c.couleur);
    h += `<th><div class="th-inner"><div class="avatar" style="background:${p.bg};color:${p.fg}">${escapeHtml(initiales(c.nom))}</div>${escapeHtml(c.nom)}</div></th>`;
  }
  document.getElementById('hrow').innerHTML = h;

  let f = '<td><i class="ti ti-plus" style="font-size:13px;"></i></td>';
  for (let ci = 0; ci < COMMS.length; ci++) {
    f += `<td><div class="add-cell"><input id="a${ci}" placeholder="Ajouter…" onkeydown="addTask(event,${ci})"/></div></td>`;
  }
  document.getElementById('frow').innerHTML = f;

  // Largeur mini : force le scroll horizontal si trop de colonnes
  document.getElementById('ttable').style.minWidth =
    (36 + 175 * Math.max(COMMS.length, 1)) + 'px';
}

function render() {
  const tb  = document.getElementById('tbody');
  tb.innerHTML = '';
  if (COMMS.length === 0) return;
  const idx = buildSortedIndexes();
  for (let di = 0; di < idx.length; di++) {
    const tr  = document.createElement('tr');
    let html  = `<td>${di + 1}</td>`;
    for (let ci = 0; ci < COMMS.length; ci++) {
      const ri   = idx[di][ci];
      const cell = cellAt(ri, ci);
      const prioDisplay = cell.prio
        ? cell.prio
        : '<span class="placeholder">P</span>';
      html += `<td>
        <div class="cell">
          <div class="task">
            <input type="checkbox" ${cell.done ? 'checked' : ''} onchange="toggle(${ri},${ci})"/>
            <textarea rows="1" placeholder="—" class="${cell.done ? 'done' : ''}"
              data-di="${di}" data-ci="${ci}"
              onblur="editText(${ri},${ci},this.value)"
              oninput="resize(this)"
              onkeydown="handleTab(event, ${di}, ${ci})"
            >${escapeHtml(cell.text)}</textarea>
            <button class="del" onclick="clearCell(${ri},${ci})" aria-label="Effacer">
              <i class="ti ti-x"></i>
            </button>
          </div>
          <div class="prio">
            <button class="prio-btn ${cell.prio ? 'filled' : ''}"
              onclick="openKeypad(${ri},${ci})">${prioDisplay}</button>
          </div>
        </div>
      </td>`;
    }
    tr.innerHTML = html;
    tb.appendChild(tr);
    const tas = tr.querySelectorAll('textarea');
    tas.forEach(ta => setTimeout(() => resize(ta), 0));
  }
}

// ─── Interactions ────────────────────────────────────────────
function handleTab(e, di, ci) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta  = e.target;
  const ri  = buildSortedIndexes()[di][ci];
  if (ri !== undefined) cellAt(ri, ci).text = ta.value;
  const allRows = document.querySelectorAll('#tbody tr');
  const nextDi  = e.shiftKey ? di - 1 : di + 1;
  if (nextDi >= 0 && nextDi < allRows.length) {
    const target = document.querySelector(`textarea[data-di="${nextDi}"][data-ci="${ci}"]`);
    if (target) { target.focus(); target.select(); return; }
  }
  if (!e.shiftKey && nextDi >= allRows.length) {
    const addInput = document.getElementById('a' + ci);
    if (addInput) addInput.focus();
  }
}

function resize(el) { el.style.height = 'auto'; el.style.height = Math.max(28, el.scrollHeight) + 'px'; }
function toggle(ri, ci) { const c = cellAt(ri, ci); c.done = !c.done; save(); render(); }
function editText(ri, ci, val) { cellAt(ri, ci).text = val; save(); }
function clearCell(ri, ci) {
  const arr = colArr(ci);
  if (arr[ri]) arr[ri] = { text: '', done: false, prio: '' };
  renumberPriorities(ci);
  save(); render();
}

function addTask(e, ci) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = e.target.value.trim();
  if (!val) return;
  const arr = colArr(ci);
  const max = rowCount();
  let placed = false;
  for (let ri = 0; ri < max; ri++) {
    if (!cellAt(ri, ci).text) { arr[ri].text = val; placed = true; break; }
  }
  if (!placed) arr.push({ text: val, done: false, prio: '' });
  e.target.value = '';
  save(); render();
}

function resetAll() {
  if (!confirm('Remettre à zéro toutes les cases ?')) return;
  for (let ci = 0; ci < COMMS.length; ci++) {
    colArr(ci).forEach(c => { c.done = false; c.prio = ''; });
  }
  save(); render();
}

// ─── Keypad modal ────────────────────────────────────────────
function openKeypad(ri, ci) {
  kpTarget = { ri, ci };
  const arr = colArr(ci);
  const input = document.getElementById('modal-input');
  input.value = cellAt(ri, ci).prio || '';
  const existingCount = arr.filter((c, r) => c.prio !== '' && c.text !== '').length;
  const info = document.getElementById('renumberInfo');
  if (existingCount > 0) {
    info.textContent = `${existingCount} priorité(s) existante(s) — seront renumérotées automatiquement`;
    info.classList.add('show');
  } else {
    info.classList.remove('show');
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => input.focus(), 50);
}

function closeKeypadIfBg(e) { if (e.target.id === 'modal-bg') closeKeypad(); }
function closeKeypad() { kpTarget = null; document.getElementById('modal-bg').classList.remove('open'); }

function kpType(val) {
  const clean = val.replace(/[^0-9]/g, '').slice(0, 4);
  document.getElementById('modal-input').value = clean;
}
function kpKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); kpOk(); }
  else if (e.key === 'Escape') { e.preventDefault(); closeKeypad(); }
}
function kpAdd(digit) {
  const input = document.getElementById('modal-input');
  if (input.value.length >= 4) return;
  input.value = input.value + digit;
}
function kpDel() {
  const input = document.getElementById('modal-input');
  input.value = input.value.slice(0, -1);
}

function kpOk() {
  if (!kpTarget) return;
  const { ri, ci } = kpTarget;
  const val = document.getElementById('modal-input').value;
  cellAt(ri, ci).prio = val;
  if (val !== '') {
    renumberPriorities(ci);
  }
  save();
  closeKeypad();
  render();
}


// ─── Temps réel (Supabase Realtime) ──────────────────────────
// Chaque sauvegarde envoie un signal aux autres appareils connectés,
// qui rechargent aussitôt leurs données. Le rafraîchissement périodique
// reste en roue de secours si le temps réel est indisponible.
const RT_URL = 'https://bupktwjiwsovnqhveans.supabase.co';
const RT_KEY = 'sb_publishable_j2SeTihDgrRh24Ebzraeeg_FW0IUsKR'; // clé publique (sans danger dans le code)
let rtChannel = null;
function rtInit(keys, onChange) {
  try {
    if (!window.supabase) return; // librairie non chargée → le rafraîchissement périodique prend le relais
    const client = window.supabase.createClient(RT_URL, RT_KEY);
    rtChannel = client.channel('app-sync');
    rtChannel.on('broadcast', { event: 'changed' }, (msg) => {
      const k = msg && msg.payload && msg.payload.key;
      if (keys.indexOf(k) !== -1) onChange();
    }).subscribe();
  } catch (e) { /* le rafraîchissement périodique prend le relais */ }
}
function rtNotify(key) {
  try {
    if (rtChannel) rtChannel.send({ type: 'broadcast', event: 'changed', payload: { key } });
  } catch (e) { /* pas grave : le rafraîchissement périodique des autres prendra le relais */ }
}

rtInit(['tasks', 'config'], () => poll()); // rechargement instantané quand quelqu'un modifie

// ─── Date ────────────────────────────────────────────────────
document.getElementById('tdate').textContent =
  '— ' + new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

load();
