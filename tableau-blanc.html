<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tableau blanc — Truck Agence</title>
<script>
  (function() {
    const until = parseInt(localStorage.getItem('ta_auth_until') || '0');
    if (until <= Date.now()) {
      window.location.href = '/login.html?next=' + encodeURIComponent(window.location.pathname);
    }
  })();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text2: #777;
    --text3: #bbb;
    --blue: #004472;
    --red: #CD1719;
    --green: #2d8a4e;
  }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    touch-action: none;
  }
  body { padding: 12px; display: flex; flex-direction: column; }

  /* NAV */
  .nav {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 10px; flex-shrink: 0;
  }
  .nav a {
    font-size: 12px; color: var(--text2); text-decoration: none;
    padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px;
    background: var(--bg); transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .nav a:hover { border-color: var(--blue); color: var(--blue); }
  .nav a.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* TOOLBAR */
  .toolbar {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px 12px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .tool-group {
    display: flex; align-items: center; gap: 6px;
    padding-right: 14px; border-right: 1px solid var(--border);
  }
  .tool-group:last-child { border-right: none; padding-right: 0; }
  .tool-group .lbl {
    font-size: 10px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px;
  }

  .tool-btn {
    width: 36px; height: 36px; border: 1.5px solid var(--border);
    background: white; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; color: var(--text2); font-size: 16px;
  }
  .tool-btn:hover { background: var(--bg2); }
  .tool-btn.active { border-color: var(--blue); background: #f0f6fa; color: var(--blue); }
  .tool-btn.eraser.active { border-color: var(--red); background: #fef0f0; color: var(--red); }
  .tool-btn.lasso.active  { border-color: var(--green); background: #edf7f1; color: var(--green); }

  .color-btn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid white; box-shadow: 0 0 0 1.5px var(--border);
    cursor: pointer; transition: transform 0.1s;
  }
  .color-btn:hover { transform: scale(1.1); }
  .color-btn.active { box-shadow: 0 0 0 2.5px var(--text); transform: scale(1.1); }
  .c-black  { background: #1a1a1a; }
  .c-blue   { background: #004472; }
  .c-red    { background: #CD1719; }
  .c-green  { background: #2d8a4e; }
  .c-orange { background: #e87900; }

  .width-btn {
    width: 36px; height: 36px; border: 1.5px solid var(--border);
    background: white; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.1s;
  }
  .width-btn:hover { background: var(--bg2); }
  .width-btn.active { border-color: var(--blue); background: #f0f6fa; }
  .width-dot { background: var(--text); border-radius: 50%; }

  .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .sync { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
  .sync-dot.ok     { background: #5a9a2a; }
  .sync-dot.saving { background: #e0920a; }
  .sync-dot.error  { background: #d03030; }

  .btn-clear {
    font-size: 12px; background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px; cursor: pointer;
    color: var(--text2); font-family: inherit;
    display: flex; align-items: center; gap: 5px; transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* CANVAS */
  .canvas-wrap {
    flex: 1; background: white; border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; position: relative;
  }
  canvas {
    display: block; width: 100%; height: 100%;
    cursor: crosshair; background: white;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  canvas.eraser-mode { cursor: cell; }
  canvas.lasso-mode  { cursor: copy; }

  /* ═══════════════════════════════════════════
     RESPONSIVE MOBILE
     ═══════════════════════════════════════════ */
  /* ═══════════════════════════════════════════
     RESPONSIVE MOBILE — tableau blanc
     ═══════════════════════════════════════════ */

  /* Portrait ET paysage : toolbar sur une seule ligne compacte */
  @media (max-width: 900px) {
    body { padding: 8px; }
    .nav { gap: 5px; margin-bottom: 8px; }
    .nav a { font-size: 11px; padding: 5px 10px; gap: 3px; }

    .toolbar {
      padding: 6px 10px;
      gap: 6px;
      margin-bottom: 8px;
      border-radius: 10px;
      flex-wrap: nowrap; /* Force une seule ligne */
      overflow-x: auto;  /* Scroll si vraiment trop petit */
      -webkit-overflow-scrolling: touch;
    }
    .tool-group { gap: 4px; padding-right: 8px; flex-shrink: 0; }
    .tool-group .lbl { display: none; } /* Labels masqués */

    .tool-btn  { width: 38px; height: 38px; font-size: 17px; flex-shrink: 0; }
    .color-btn { width: 28px; height: 28px; flex-shrink: 0; }
    .width-btn { width: 38px; height: 38px; flex-shrink: 0; }

    /* Sync : point seul, texte masqué */
    .sync span#slabel { display: none; }

    /* Bouton effacer : icône seule */
    .btn-clear .btn-text { display: none; }
    .btn-clear { padding: 8px 10px; flex-shrink: 0; }

    .right { margin-left: auto; flex-shrink: 0; }
  }

  /* Portrait uniquement : nav emoji-only */
  @media (max-width: 480px) {
    .nav a span { display: none; }
    .nav a { padding: 7px 11px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/">✅ <span>Tâches</span></a>
  <a href="/ventes.html">📊 <span>Ventes</span></a>
  <a href="/tableau-blanc.html" class="active">🖊️ <span>Tableau blanc</span></a>
</nav>

<div class="toolbar">
  <!-- Outil -->
  <div class="tool-group">
    <span class="lbl">Outil</span>
    <button class="tool-btn active" id="penBtn" onclick="setTool('pen')" title="Stylet">
      <i class="ti ti-pencil"></i>
    </button>
    <button class="tool-btn eraser" id="eraserBtn" onclick="setTool('eraser')" title="Gomme">
      <i class="ti ti-eraser"></i>
    </button>
    <button class="tool-btn lasso" id="lassoBtn" onclick="setTool('lasso')" title="Lasso (effacer une zone)">
      <i class="ti ti-lasso"></i>
    </button>
  </div>

  <!-- Couleurs -->
  <div class="tool-group" id="colorGroup">
    <span class="lbl">Couleur</span>
    <div class="color-btn c-black active" onclick="setColor('#1a1a1a', this)"></div>
    <div class="color-btn c-blue"         onclick="setColor('#004472', this)"></div>
    <div class="color-btn c-red"          onclick="setColor('#CD1719', this)"></div>
    <div class="color-btn c-green"        onclick="setColor('#2d8a4e', this)"></div>
    <div class="color-btn c-orange"       onclick="setColor('#e87900', this)"></div>
  </div>

  <!-- Épaisseur -->
  <div class="tool-group">
    <span class="lbl">Épaisseur</span>
    <button class="width-btn" onclick="setWidth(2, this)">
      <div class="width-dot" style="width:4px;height:4px"></div>
    </button>
    <button class="width-btn active" onclick="setWidth(4, this)">
      <div class="width-dot" style="width:8px;height:8px"></div>
    </button>
    <button class="width-btn" onclick="setWidth(8, this)">
      <div class="width-dot" style="width:14px;height:14px"></div>
    </button>
  </div>

  <div class="right">
    <div class="sync">
      <div class="sync-dot" id="sdot"></div>
      <span id="slabel">—</span>
    </div>
    <button class="btn-clear" onclick="confirmClear()">
      <i class="ti ti-trash"></i> <span class="btn-text">Tout effacer</span>
    </button>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="board"></canvas>
</div>

<script>
const canvas = document.getElementById('board');
const ctx    = canvas.getContext('2d');

let strokes       = [];
let currentStroke = null;
let isDrawing     = false;
let tool  = 'pen';
let color = '#1a1a1a';
let width = 4;
let saveTimer  = null;
let lastSavedHash = '';

// ═══════════════════════════════════════════════════════════
// SYSTÈME DE COORDONNÉES "MONDE" (normalisées)
// ───────────────────────────────────────────────────────────
// Tous les traits sont stockés en coordonnées d'un monde virtuel
// de largeur fixe WORLD_W. À l'affichage, ce monde est mis à
// l'échelle pour tenir dans la largeur de l'écran courant.
// Résultat : tout le monde voit le dessin entier, juste à une
// taille différente selon l'appareil.
//
// scale = (largeur réelle du canvas en CSS px) / WORLD_W
//   - écran > convertir monde → écran : valeur * scale
//   - écran > convertir écran → monde : valeur / scale
// ═══════════════════════════════════════════════════════════
const WORLD_W = 1400;          // Largeur de référence du monde
let   worldScale = 1;          // Facteur d'échelle courant
let   cssW = 0, cssH = 0;      // Dimensions CSS du canvas (px logiques)

// Convertit une distance/coordonnée du monde vers l'écran
function w2s(v) { return v * worldScale; }
// Convertit une distance/coordonnée de l'écran vers le monde
function s2w(v) { return v / worldScale; }

function fitCanvas() {
  const wrap = canvas.parentElement;
  // Forcer un reflow avant de lire les dimensions (fix iOS Safari)
  wrap.style.display = 'none';
  // eslint-disable-next-line no-unused-expressions
  wrap.offsetHeight; // lecture forcée
  wrap.style.display = '';
  const rect = wrap.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  // Fallback si getBoundingClientRect retourne 0 (iOS avant layout)
  const w = rect.width  || wrap.offsetWidth  || window.innerWidth;
  const h = rect.height || wrap.offsetHeight || (window.innerHeight - wrap.getBoundingClientRect().top - 20);

  cssW = w;
  cssH = h;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // ── Calcul du facteur d'échelle monde → écran ──
  // Le monde fait WORLD_W de large ; on l'adapte à la largeur réelle.
  worldScale = cssW / WORLD_W;

  redraw();
}

let resizeTimer = null;
window.addEventListener('resize', () => {
  // Debounce + double rAF pour iOS orientation change
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    requestAnimationFrame(() => requestAnimationFrame(fitCanvas));
  }, 100);
});

function setSyncStatus(s) {
  document.getElementById('sdot').className = 'sync-dot ' + s;
  document.getElementById('slabel').textContent =
    s === 'ok' ? 'Synchronisé' : s === 'saving' ? 'Enregistrement…' : 'Erreur sync';
}

function setTool(t) {
  tool = t;
  document.getElementById('penBtn').classList.toggle('active', t === 'pen');
  document.getElementById('eraserBtn').classList.toggle('active', t === 'eraser');
  document.getElementById('lassoBtn').classList.toggle('active', t === 'lasso');
  canvas.classList.toggle('eraser-mode', t === 'eraser');
  canvas.classList.toggle('lasso-mode',  t === 'lasso');
}
function setColor(c, el) {
  color = c;
  document.querySelectorAll('#colorGroup .color-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  if (tool === 'eraser') setTool('pen');
}
function setWidth(w, el) {
  width = w;
  document.querySelectorAll('.width-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
}

let lassoPoints = null;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  // Position en pixels écran (relatifs au canvas)
  const sx = t.clientX - rect.left;
  const sy = t.clientY - rect.top;
  // Conversion écran → monde : on STOCKE toujours en coordonnées monde
  return { x: s2w(sx), y: s2w(sy) };
}

function startStroke(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  if (tool === 'lasso') { lassoPoints = [pos]; return; }
  currentStroke = {
    color: tool === 'eraser' ? '#ffffff' : color,
    width: tool === 'eraser' ? Math.max(width * 4, 20) : width,
    tool, points: [pos]
  };
  strokes.push(currentStroke);
  drawStrokeSegment(currentStroke, 0);
}

function continueStroke(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  if (tool === 'lasso') {
    lassoPoints.push(pos);
    redraw(); drawLassoOverlay(); return;
  }
  if (!currentStroke) return;
  currentStroke.points.push(pos);
  drawStrokeSegment(currentStroke, currentStroke.points.length - 2);
}

function endStroke() {
  if (!isDrawing) return;
  isDrawing = false;
  if (tool === 'lasso' && lassoPoints && lassoPoints.length > 2) {
    eraseInsideLasso(lassoPoints);
    lassoPoints = null; redraw(); scheduleSave(); return;
  }
  lassoPoints = null;
  currentStroke = null;
  scheduleSave();
}

function drawLassoOverlay() {
  if (!lassoPoints || lassoPoints.length < 2) return;
  // lassoPoints est en coordonnées MONDE → conversion écran
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(w2s(lassoPoints[0].x), w2s(lassoPoints[0].y));
  for (let i = 1; i < lassoPoints.length; i++)
    ctx.lineTo(w2s(lassoPoints[i].x), w2s(lassoPoints[i].y));
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#2d8a4e'; ctx.lineWidth = 2; ctx.stroke();
  ctx.closePath(); ctx.fillStyle = 'rgba(45,138,78,0.08)'; ctx.fill();
  ctx.restore();
}

function pointInPolygon(p, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    const intersect = ((yi > p.y) !== (yj > p.y)) &&
      (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 0.00001) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function eraseInsideLasso(polygon) {
  strokes = strokes.filter(stroke => {
    const insideCount = stroke.points.filter(p => pointInPolygon(p, polygon)).length;
    return insideCount / stroke.points.length < 0.5;
  });
}

canvas.addEventListener('mousedown',  startStroke);
canvas.addEventListener('mousemove',  continueStroke);
canvas.addEventListener('mouseup',    endStroke);
canvas.addEventListener('mouseleave', endStroke);
canvas.addEventListener('touchstart',  startStroke,    { passive: false });
canvas.addEventListener('touchmove',   continueStroke, { passive: false });
canvas.addEventListener('touchend',    endStroke);
canvas.addEventListener('touchcancel', endStroke);

function drawStrokeSegment(stroke, fromIdx) {
  // Les points sont en coordonnées MONDE → on convertit en écran (w2s)
  if (stroke.points.length < 2) {
    ctx.beginPath(); ctx.fillStyle = stroke.color;
    ctx.arc(w2s(stroke.points[0].x), w2s(stroke.points[0].y),
            w2s(stroke.width) / 2, 0, Math.PI * 2);
    ctx.fill(); return;
  }
  ctx.beginPath();
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = w2s(stroke.width);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.moveTo(w2s(stroke.points[fromIdx].x),     w2s(stroke.points[fromIdx].y));
  ctx.lineTo(w2s(stroke.points[fromIdx + 1].x), w2s(stroke.points[fromIdx + 1].y));
  ctx.stroke();
}

function redraw() {
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const stroke of strokes) {
    // Points stockés en MONDE → conversion écran via w2s()
    if (stroke.points.length < 2) {
      ctx.beginPath(); ctx.fillStyle = stroke.color;
      ctx.arc(w2s(stroke.points[0].x), w2s(stroke.points[0].y),
              w2s(stroke.width) / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.strokeStyle = stroke.color;
      ctx.lineWidth = w2s(stroke.width);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.moveTo(w2s(stroke.points[0].x), w2s(stroke.points[0].y));
      for (let i = 1; i < stroke.points.length; i++)
        ctx.lineTo(w2s(stroke.points[i].x), w2s(stroke.points[i].y));
      ctx.stroke();
    }
  }
}

async function loadData() {
  try {
    const r = await fetch('/api/board');
    if (!r.ok) throw 0;
    const d = await r.json();
    strokes = d.strokes || [];
    lastSavedHash = JSON.stringify(strokes);
    setSyncStatus('ok'); redraw();
  } catch(e) { strokes = []; setSyncStatus('error'); }
}

function scheduleSave() {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const hash = JSON.stringify(strokes);
    if (hash === lastSavedHash) { setSyncStatus('ok'); return; }
    try {
      await fetch('/api/board', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ strokes })
      });
      lastSavedHash = hash; setSyncStatus('ok');
    } catch(e) { setSyncStatus('error'); }
  }, 1500);
}

async function poll() {
  if (isDrawing) return;
  try {
    const r = await fetch('/api/board');
    if (!r.ok) return;
    const d = await r.json();
    const newHash = JSON.stringify(d.strokes || []);
    if (newHash !== lastSavedHash) {
      strokes = d.strokes || []; lastSavedHash = newHash; redraw();
    }
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

function confirmClear() {
  if (!confirm('Effacer complètement le tableau ?')) return;
  strokes = []; redraw(); scheduleSave();
}

// Double rAF au démarrage : garantit que le layout iOS est stabilisé
// avant de calculer les dimensions du canvas
requestAnimationFrame(() => requestAnimationFrame(() => {
  fitCanvas();
  loadData();
  setInterval(poll, 5000);
}));
</script>
</body>
</html>
