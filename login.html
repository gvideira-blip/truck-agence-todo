<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accès — Truck Agence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --text2: #777;
      --text3: #bbb;
      --blue: #004472;
      --red: #CD1719;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      min-width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .logo {
      width: 12px; height: 12px;
      background: var(--red);
      border-radius: 50%;
      margin: 0 auto 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 24px;
    }
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      transition: all 0.15s;
    }
    .pin-dot.filled { background: var(--blue); border-color: var(--blue); }
    .pin-dot.error { background: var(--red); border-color: var(--red); animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 8px;
      justify-content: center;
    }
    .key {
      height: 56px;
      font-size: 22px;
      font-weight: 500;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: background 0.1s, transform 0.05s;
    }
    .key:hover { background: var(--bg2); }
    .key:active { transform: scale(0.95); background: #e0e0de; }
    .key.del-key { color: var(--red); font-size: 18px; }
    .key.empty { visibility: hidden; }
    .hint {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 16px;
    }
    .error-msg {
      color: var(--red);
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>Truck Agence</h1>
    <div class="subtitle">Saisissez le code d'accès</div>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="press('1')">1</button>
      <button class="key" onclick="press('2')">2</button>
      <button class="key" onclick="press('3')">3</button>
      <button class="key" onclick="press('4')">4</button>
      <button class="key" onclick="press('5')">5</button>
      <button class="key" onclick="press('6')">6</button>
      <button class="key" onclick="press('7')">7</button>
      <button class="key" onclick="press('8')">8</button>
      <button class="key" onclick="press('9')">9</button>
      <button class="key empty"></button>
      <button class="key" onclick="press('0')">0</button>
      <button class="key del-key" onclick="del()">←</button>
    </div>
    <div class="error-msg" id="errMsg"></div>
    <div class="hint">12 heures d'accès après validation</div>
  </div>

  <script>
    const PIN = '0110';
    const SESSION_HOURS = 12;
    let buffer = '';

    // Si déjà connecté → rediriger
    const until = parseInt(localStorage.getItem('ta_auth_until') || '0');
    if (until > Date.now()) {
      window.location.href = '/';
    }

    // Si on vient d'une autre page, mémoriser pour rediriger après login
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('next') || '/';

    function updateDisplay() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.toggle('filled', i < buffer.length);
        dot.classList.remove('error');
      }
      document.getElementById('errMsg').textContent = '';
    }

    function press(digit) {
      if (buffer.length >= 4) return;
      buffer += digit;
      updateDisplay();
      if (buffer.length === 4) setTimeout(check, 150);
    }

    function del() {
      buffer = buffer.slice(0, -1);
      updateDisplay();
    }

    function check() {
      if (buffer === PIN) {
        const expiresAt = Date.now() + SESSION_HOURS * 60 * 60 * 1000;
        localStorage.setItem('ta_auth_until', expiresAt.toString());
        window.location.href = redirect;
      } else {
        // Erreur visuelle
        for (let i = 0; i < 4; i++) {
          document.getElementById('d' + i).classList.add('error');
        }
        document.getElementById('errMsg').textContent = 'Code incorrect';
        setTimeout(() => { buffer = ''; updateDisplay(); }, 600);
      }
    }

    // Clavier physique
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') press(e.key);
      else if (e.key === 'Backspace') del();
    });
  </script>
</body>
</html>
