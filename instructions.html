<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Point à faire avec Gaëtan — Truck Agence</title>
<script>
(function() {
  const until = parseInt(localStorage.getItem('ta_auth_until') || '0');
  if (until <= Date.now()) {
    window.location.href = '/login.html?next=' + encodeURIComponent(window.location.pathname);
  }
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff;
  --bg2: #f5f5f3;
  --border: rgba(0,0,0,0.1);
  --text: #1a1a1a;
  --text2: #777;
  --text3: #bbb;
  --blue: #004472;
  --red: #CD1719;
  --r: 12px;
  --rs: 8px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg2);
  min-height: 100vh;
  padding: 24px;
  color: var(--text);
}
/* NAV (identique aux autres pages) */
.nav {
  display: flex; justify-content: center; gap: 8px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.nav a {
  font-size: 12px; color: var(--text2); text-decoration: none;
  padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px;
  background: var(--bg); transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.nav a:hover { border-color: var(--blue); color: var(--blue); }
.nav a.active { background: var(--blue); color: #fff; border-color: var(--blue); }

.wrap {
  background: var(--bg); border-radius: var(--r);
  border: 1px solid var(--border);
  max-width: 760px; margin: 0 auto;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
.title { font-size: 15px; font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.sync { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
.sync-dot.ok { background: #5a9a2a; }
.sync-dot.saving { background: #e0920a; }
.sync-dot.error { background: #d03030; }
.btn-hide {
  font-size: 12px; color: var(--text2);
  background: none; border: 1px solid var(--border);
  border-radius: var(--rs); padding: 5px 12px;
  cursor: pointer; display: flex; align-items: center; gap: 4px;
}
.btn-hide:hover { background: var(--bg2); }
.btn-hide.on { background: var(--blue); color: #fff; border-color: var(--blue); }

/* LISTE */
.list { padding: 4px 0; }
.empty {
  text-align: center; color: var(--text3); font-size: 14px;
  padding: 40px 20px;
}
.item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.item:last-child { border-bottom: none; }
.item:hover { background: var(--bg2); }
.item input[type=checkbox] {
  width: 20px; height: 20px; accent-color: var(--blue);
  flex-shrink: 0; cursor: pointer; margin-top: 2px;
}
.item-body { flex: 1; min-width: 0; }
.item-text {
  width: 100%;
  font-size: 15px; line-height: 1.45; color: var(--text);
  font-family: inherit;
  border: none; outline: none; resize: none; background: none;
  padding: 0; overflow: hidden;
  border-radius: 4px;
}
.item-text:focus { background: var(--bg2); }
.item-text.done { text-decoration: line-through; color: var(--text3); }
.item-meta {
  display: flex; align-items: center; gap: 8px; margin-top: 5px;
  font-size: 11px; color: var(--text3);
}
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
}
/* Les couleurs des badges des commerciaux sont appliquées dynamiquement
   depuis la configuration (page ⚙️ Configuration). */
.badge.b-g  { background: #fdecc8; color: #7a5500; }
.badge.b-x  { background: #eee; color: #777; }

/* Bouton priorité (repris des tâches) */
.prio { flex-shrink: 0; display: flex; align-items: center; }
.prio-btn {
  width: 46px; height: 38px; background: white;
  border: 1.5px dashed var(--border); border-radius: 6px;
  font-size: 17px; font-weight: 500; color: var(--blue);
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.1s;
}
.prio-btn.filled { border-style: solid; border-color: var(--blue); background: #f0f6fa; }
.prio-btn:hover { border-color: var(--blue); }
.prio-btn .placeholder { color: var(--text3); font-size: 13px; font-weight: 400; }

.del {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 15px;
  padding: 4px; border-radius: 4px;
  opacity: 0; transition: opacity 0.15s; flex-shrink: 0; margin-top: 2px;
}
.item:hover .del { opacity: 1; }
.del:hover { color: var(--red); }

/* AJOUT */
.add {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; background: var(--bg2);
  border-top: 1px solid var(--border);
  border-radius: 0 0 var(--r) var(--r);
}
.add select {
  font-size: 13px; font-family: inherit; color: var(--text);
  border: 1px solid var(--border); border-radius: var(--rs);
  padding: 7px 8px; background: var(--bg); cursor: pointer;
  flex-shrink: 0;
}
.add input {
  flex: 1; font-size: 14px; font-family: inherit;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--rs); padding: 8px 12px;
  outline: none; color: var(--text);
}
.add input:focus { border-color: var(--blue); }
.add input::placeholder { color: var(--text3); }
.add button {
  font-size: 14px; background: var(--blue); color: #fff;
  border: none; border-radius: var(--rs); padding: 8px 16px;
  cursor: pointer; font-family: inherit; flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
}
.add button:hover { background: #003560; }

/* Modal priorité (repris des tâches) */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center; z-index: 200;
}
.modal-bg.open { display: flex; }
.modal {
  background: white; border-radius: 16px; padding: 24px; min-width: 280px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal-title { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 12px; }
.modal-input {
  width: 100%; height: 64px; background: var(--bg2);
  border: 2px solid var(--blue); border-radius: 10px; margin-bottom: 16px;
  text-align: center; outline: none;
  font-size: 28px; font-weight: 500; color: var(--blue); font-family: inherit;
}
.modal-input::placeholder { color: var(--text3); font-size: 16px; font-weight: 400; }
.keypad { display: grid; grid-template-columns: repeat(3, 64px); gap: 8px; justify-content: center; }
.key {
  height: 52px; font-size: 20px; font-weight: 500; background: white;
  border: 1.5px solid var(--border); border-radius: 10px;
  cursor: pointer; font-family: inherit; color: var(--text);
  transition: background 0.1s, transform 0.05s;
}
.key:hover { background: var(--bg2); }
.key:active { transform: scale(0.95); background: #e0e0de; }
.key.action { font-size: 13px; color: var(--text2); }
.key.ok { background: var(--blue); color: white; border-color: var(--blue); font-weight: 500; }
.key.ok:hover { background: #003560; }
.key.del-key { color: var(--red); }
.modal-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; }
.modal-renumber-info {
  font-size: 11px; color: var(--blue); text-align: center;
  margin-top: 6px; padding: 4px 8px; background: #f0f6fa;
  border-radius: 6px; display: none;
}
.modal-renumber-info.show { display: block; }

#loader {
  position: fixed; inset: 0; background: rgba(255,255,255,0.92);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text2); z-index: 100;
}

@media (max-width: 768px) {
  body { padding: 10px; }
  .nav { gap: 5px; margin-bottom: 12px; }
  .nav a { font-size: 11px; padding: 5px 10px; gap: 3px; }
  .topbar { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .add { flex-wrap: wrap; }
  .add input { width: 100%; flex-basis: 100%; order: -1; }
  .modal-bg { align-items: flex-end; }
  .modal { border-radius: 16px 16px 0 0; width: 100%; padding: 20px 16px 36px; }
  .keypad { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .key { height: 56px; }
}
@media (max-width: 480px) {
  .nav a span { display: none; }
  .nav a { padding: 6px 10px; }
}
</style>
</head>
<body>
<div id="loader">Chargement…</div>

<nav class="nav">
  <a href="/">✅ <span>Tâches</span></a>
  <a href="/ventes.html">📊 <span>Ventes</span></a>
  <a href="/tableau-blanc.html">🖊️ <span>Tableau blanc</span></a>
  <a href="/instructions.html" class="active">📌 <span>Point Gaëtan</span></a>
  <a href="/idees.html">💡 <span>Idées</span></a>
  <a href="/config.html">⚙️ <span>Configuration</span></a>
</nav>

<div class="wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="dot"></div>
      <span class="title">Point à faire avec Gaëtan</span>
    </div>
    <div class="topbar-right">
      <div class="sync">
        <div class="sync-dot" id="sdot"></div>
        <span id="slabel">—</span>
      </div>
      <button class="btn-hide" id="hideBtn" onclick="toggleHideDone()">
        <i class="ti ti-eye-off"></i> Masquer traités
      </button>
    </div>
  </div>

  <div class="list" id="list"></div>

  <div class="add">
    <select id="author" title="Qui ?">
      <option value="" disabled selected>Qui ?</option>
      <option value="Gaëtan">Gaëtan</option>
    </select>
    <input id="newInput" placeholder="Nouveau point… (ex. : vérifier texte annonce LGOT)"
           onkeydown="if(event.key==='Enter'){event.preventDefault();addItem();}"/>
    <button onclick="addItem()"><i class="ti ti-plus"></i> Ajouter</button>
  </div>
</div>

<!-- Modal priorité -->
<div class="modal-bg" id="modal-bg" onclick="closeKeypadIfBg(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Priorité</div>
    <input class="modal-input" id="modal-input" type="text" inputmode="numeric"
           placeholder="—" maxlength="4"
           oninput="kpType(this.value)"
           onkeydown="kpKeydown(event)" />
    <div class="modal-renumber-info" id="renumberInfo"></div>
    <div class="keypad">
      <button class="key" onclick="kpAdd('1')">1</button>
      <button class="key" onclick="kpAdd('2')">2</button>
      <button class="key" onclick="kpAdd('3')">3</button>
      <button class="key" onclick="kpAdd('4')">4</button>
      <button class="key" onclick="kpAdd('5')">5</button>
      <button class="key" onclick="kpAdd('6')">6</button>
      <button class="key" onclick="kpAdd('7')">7</button>
      <button class="key" onclick="kpAdd('8')">8</button>
      <button class="key" onclick="kpAdd('9')">9</button>
      <button class="key action del-key" onclick="kpDel()">←</button>
      <button class="key" onclick="kpAdd('0')">0</button>
      <button class="key action ok" onclick="kpOk()">OK</button>
    </div>
    <div class="modal-hint">Tapez au clavier ou utilisez le pavé — Entrée pour valider</div>
  </div>
</div>

<script>
let data = [];
let saveTimer = null;
let pendingSave = false;
let hideDone = false;
let kpTarget = null; // id de l'item en cours d'édition de priorité
// Ids connus lors de la dernière synchro avec le serveur.
// Sert à la fusion : permet de distinguer "j'ai supprimé" de "jamais vu".
// IMPORTANT : mis à jour UNIQUEMENT à la lecture du serveur (load/poll),
// jamais lors d'une modif locale.
let knownIds = [];

// ─── Statut de synchro ───────────────────────────────────────
function setSyncStatus(s) {
  document.getElementById('sdot').className = 'sync-dot ' + s;
  document.getElementById('slabel').textContent =
    s === 'ok' ? 'Synchronisé' : s === 'saving' ? 'Enregistrement…' : 'Erreur sync';
}

// ─── Équipe (chargée depuis /api/config, gérée via ⚙️ Configuration) ──
const PALETTE = [
  { bg: '#deeefb', fg: '#0a4a7c' }, // 0 bleu
  { bg: '#d6f0e6', fg: '#08503e' }, // 1 vert
  { bg: '#eae8fc', fg: '#3a338a' }, // 2 violet
  { bg: '#fde8ef', fg: '#8a2a55' }, // 3 rose
  { bg: '#d8f1f4', fg: '#0b5d68' }, // 4 turquoise
  { bg: '#fde4d2', fg: '#8a4210' }, // 5 orange
  { bg: '#e6f2cf', fg: '#4a6314' }, // 6 vert clair
  { bg: '#e9e9e9', fg: '#555555' }  // 7 gris
];
let COMMS = []; // [{ id, nom, couleur }]

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    if (!r.ok) return;
    const j = await r.json();
    if (!Array.isArray(j.commerciaux)) return;
    COMMS = j.commerciaux;
    // Remplit le menu "Qui ?" : Gaëtan + les commerciaux
    const sel = document.getElementById('author');
    const current = sel.value;
    sel.innerHTML = '<option value="" disabled selected>Qui ?</option>' +
      '<option value="Gaëtan">Gaëtan</option>' +
      COMMS.map(c => `<option value="${escapeHtml(c.nom)}">${escapeHtml(c.nom)}</option>`).join('');
    if (current) sel.value = current;
  } catch(e) { /* le menu garde au moins Gaëtan */ }
}

// ─── Chargement & poll (même logique que index.html) ─────────
async function load() {
  await loadConfig();
  try {
    const r = await fetch('/api/instructions');
    if (!r.ok) throw 0;
    const j = await r.json();
    data = Array.isArray(j) ? j : [];
    knownIds = data.map(it => it.id);
    setSyncStatus('ok');
  } catch(e) { data = []; setSyncStatus('error'); }
  document.getElementById('loader').style.display = 'none';
  render();
  setInterval(poll, 5000);
}

async function poll() {
  if (kpTarget) return; // ne pas perturber pendant la saisie d'une priorité
  if (pendingSave) return;
  if (document.activeElement && (
      document.activeElement.tagName === 'TEXTAREA' ||
      document.activeElement.tagName === 'INPUT' ||
      document.activeElement.tagName === 'SELECT')) return;
  try {
    const r = await fetch('/api/instructions');
    if (!r.ok) return;
    const newData = await r.json();
    if (pendingSave) return;
    const safeNew = Array.isArray(newData) ? newData : [];
    knownIds = safeNew.map(it => it.id);
    if (JSON.stringify(safeNew) !== JSON.stringify(data)) {
      data = safeNew;
      render();
    }
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

// ─── Sauvegarde (debounce + verrou anti-écrasement) ──────────
function save() {
  setSyncStatus('saving');
  pendingSave = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const snapshot = JSON.stringify(data);
    try {
      const r = await fetch('/api/instructions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: data, knownIds })
      });
      if (!r.ok) throw 0;
      if (JSON.stringify(data) === snapshot) pendingSave = false;
      setSyncStatus('ok');
      rtNotify('instructions'); // prévient instantanément les autres appareils
    } catch(e) { setSyncStatus('error'); }
  }, 700);
}

// ─── Renumérotation des priorités (repris des tâches) ────────
// Après modification d'une priorité, on renumérote toute la liste
// pour garder une séquence propre 1, 2, 3… sans trous ni doublons.
function renumberPriorities() {
  const withPrio = data.filter(it => it.prio !== '' && it.prio != null && it.text !== '');
  withPrio.sort((a, b) => parseFloat(a.prio) - parseFloat(b.prio));
  withPrio.forEach((it, idx) => { it.prio = String(idx + 1); });
}

// ─── Rendu ───────────────────────────────────────────────────
function badgeFor(author) {
  if (author === 'Gaëtan') return '<span class="badge b-g">Gaëtan</span>';
  const c = COMMS.find(x => x.nom === author);
  if (c) {
    const p = PALETTE[(c.couleur >= 0 && c.couleur < 8) ? c.couleur : 7];
    return `<span class="badge" style="background:${p.bg};color:${p.fg}">${escapeHtml(c.nom)}</span>`;
  }
  // Auteur inconnu (ex. : commercial parti) → badge gris, le nom reste lisible
  return '<span class="badge b-x">' + escapeHtml(author || '—') + '</span>';
}
function fmtDate(ts) {
  if (!ts) return '';
  try {
    return new Date(ts).toLocaleDateString('fr-FR',
      { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ''; }
}
function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Tri : d'abord les éléments avec priorité (croissant), puis les autres.
function sortedItems() {
  const withPrio = data.filter(it => it.prio !== '' && it.prio != null);
  const noPrio   = data.filter(it => !(it.prio !== '' && it.prio != null));
  withPrio.sort((a, b) => parseFloat(a.prio) - parseFloat(b.prio));
  return [...withPrio, ...noPrio];
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  const visible = sortedItems().filter(it => !(hideDone && it.done));
  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">Aucun point pour le moment.</div>';
    return;
  }
  visible.forEach(it => {
    const prioDisplay = it.prio ? it.prio : '<span class="placeholder">P</span>';
    const row = document.createElement('div');
    row.className = 'item';
    row.innerHTML = `
      <input type="checkbox" ${it.done ? 'checked' : ''} onchange="toggle('${it.id}')"/>
      <div class="item-body">
        <textarea class="item-text ${it.done ? 'done' : ''}" rows="1"
                  onblur="editText('${it.id}', this.value)"
                  oninput="resize(this)">${escapeHtml(it.text)}</textarea>
        <div class="item-meta">${badgeFor(it.author)}<span>${fmtDate(it.ts)}</span></div>
      </div>
      <div class="prio">
        <button class="prio-btn ${it.prio ? 'filled' : ''}" onclick="openKeypad('${it.id}')">${prioDisplay}</button>
      </div>
      <button class="del" onclick="removeItem('${it.id}')" aria-label="Supprimer">
        <i class="ti ti-x"></i>
      </button>`;
    list.appendChild(row);
    const ta = row.querySelector('.item-text');
    if (ta) setTimeout(() => resize(ta), 0);
  });
}

// ─── Interactions ────────────────────────────────────────────
function addItem() {
  const input = document.getElementById('newInput');
  const author = document.getElementById('author').value;
  const text = input.value.trim();
  if (!author) { alert('Choisis d\'abord qui écrit (menu de gauche).'); return; }
  if (!text) return;
  data.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    text, author, done: false, prio: '', ts: Date.now()
  });
  input.value = '';
  input.focus();
  save();
  render();
}
function toggle(id) {
  const it = data.find(x => x.id === id);
  if (it) { it.done = !it.done; save(); render(); }
}
// Modification du texte d'une ligne existante (enregistré à la sortie du champ)
function editText(id, val) {
  const it = data.find(x => x.id === id);
  if (it && it.text !== val) { it.text = val; save(); }
}
function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(24, el.scrollHeight) + 'px';
}
function removeItem(id) {
  if (!confirm('Supprimer ce point ?')) return;
  data = data.filter(x => x.id !== id);
  renumberPriorities();
  save();
  render();
}
function toggleHideDone() {
  hideDone = !hideDone;
  document.getElementById('hideBtn').classList.toggle('on', hideDone);
  render();
}

// ─── Pavé numérique priorité (repris des tâches) ─────────────
function openKeypad(id) {
  kpTarget = id;
  const it = data.find(x => x.id === id);
  const input = document.getElementById('modal-input');
  input.value = (it && it.prio) ? it.prio : '';
  const existingCount = data.filter(x => x.prio !== '' && x.prio != null && x.text !== '').length;
  const info = document.getElementById('renumberInfo');
  if (existingCount > 0) {
    info.textContent = existingCount + ' priorité(s) existante(s) — seront renumérotées automatiquement';
    info.classList.add('show');
  } else {
    info.classList.remove('show');
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => input.focus(), 50);
}
function closeKeypadIfBg(e) { if (e.target.id === 'modal-bg') closeKeypad(); }
function closeKeypad() { kpTarget = null; document.getElementById('modal-bg').classList.remove('open'); }
function kpType(val) {
  document.getElementById('modal-input').value = val.replace(/[^0-9]/g, '').slice(0, 4);
}
function kpKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); kpOk(); }
  else if (e.key === 'Escape') { e.preventDefault(); closeKeypad(); }
}
function kpAdd(digit) {
  const input = document.getElementById('modal-input');
  if (input.value.length >= 4) return;
  input.value = input.value + digit;
}
function kpDel() {
  const input = document.getElementById('modal-input');
  input.value = input.value.slice(0, -1);
}
function kpOk() {
  if (!kpTarget) return;
  const it = data.find(x => x.id === kpTarget);
  const val = document.getElementById('modal-input').value;
  if (it) it.prio = val;
  if (val !== '') renumberPriorities();
  save();
  closeKeypad();
  render();
}


// ─── Temps réel (Supabase Realtime) ──────────────────────────
// Chaque sauvegarde envoie un signal aux autres appareils connectés,
// qui rechargent aussitôt leurs données. Le rafraîchissement périodique
// reste en roue de secours si le temps réel est indisponible.
const RT_URL = 'https://bupktwjiwsovnqhveans.supabase.co';
const RT_KEY = 'sb_publishable_j2SeTihDgrRh24Ebzraeeg_FW0IUsKR'; // clé publique (sans danger dans le code)
let rtChannel = null;
function rtInit(keys, onChange) {
  try {
    if (!window.supabase) return; // librairie non chargée → le rafraîchissement périodique prend le relais
    const client = window.supabase.createClient(RT_URL, RT_KEY);
    rtChannel = client.channel('app-sync');
    rtChannel.on('broadcast', { event: 'changed' }, (msg) => {
      const k = msg && msg.payload && msg.payload.key;
      if (keys.indexOf(k) !== -1) onChange();
    }).subscribe();
  } catch (e) { /* le rafraîchissement périodique prend le relais */ }
}
function rtNotify(key) {
  try {
    if (rtChannel) rtChannel.send({ type: 'broadcast', event: 'changed', payload: { key } });
  } catch (e) { /* pas grave : le rafraîchissement périodique des autres prendra le relais */ }
}

rtInit(['instructions', 'config'], () => { loadConfig(); poll(); });

load();
